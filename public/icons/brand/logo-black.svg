<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Monochrome black version - for use on light/white backgrounds -->

  <!-- Top-Left Panel -->
  <rect x="112" y="112" width="388" height="388" rx="60" fill="none" stroke="#1A1A1A" stroke-width="4"/>
  <!-- Top-Right Panel -->
  <rect x="524" y="112" width="388" height="388" rx="60" fill="none" stroke="#1A1A1A" stroke-width="4"/>
  <!-- Bottom-Left Panel -->
  <rect x="112" y="524" width="388" height="388" rx="60" fill="none" stroke="#1A1A1A" stroke-width="4"/>
  <!-- Bottom-Right Panel -->
  <rect x="524" y="524" width="388" height="388" rx="60" fill="none" stroke="#1A1A1A" stroke-width="4"/>

  <!-- Filled quadrants with low opacity for structure -->
  <rect x="112" y="112" width="388" height="388" rx="60" fill="#1A1A1A" fill-opacity="0.10"/>
  <rect x="524" y="112" width="388" height="388" rx="60" fill="#1A1A1A" fill-opacity="0.07"/>
  <rect x="112" y="524" width="388" height="388" rx="60" fill="#1A1A1A" fill-opacity="0.07"/>
  <rect x="524" y="524" width="388" height="388" rx="60" fill="#1A1A1A" fill-opacity="0.04"/>

  <!-- Letter A -->
  <text x="512" y="640" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="520" font-weight="700" fill="#1A1A1A" text-anchor="middle" letter-spacing="-10">A</text>
</svg>
