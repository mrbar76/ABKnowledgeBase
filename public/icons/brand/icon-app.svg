<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Simplified, bolder gradients for small sizes -->
    <linearGradient id="tl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F7DF7"/>
      <stop offset="100%" stop-color="#7B4FD8"/>
    </linearGradient>
    <linearGradient id="tr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9B5DE5"/>
      <stop offset="100%" stop-color="#F06292"/>
    </linearGradient>
    <linearGradient id="bl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42B4E6"/>
      <stop offset="100%" stop-color="#6580E8"/>
    </linearGradient>
    <linearGradient id="br" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E06090"/>
      <stop offset="100%" stop-color="#F5A070"/>
    </linearGradient>
    <!-- Simple glass highlight - top only -->
    <linearGradient id="glass" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Quadrant panels - slightly larger gap for clarity at small sizes -->
  <!-- Top-Left -->
  <rect x="100" y="100" width="396" height="396" rx="56" fill="url(#tl)"/>
  <rect x="100" y="100" width="396" height="396" rx="56" fill="url(#glass)"/>

  <!-- Top-Right -->
  <rect x="528" y="100" width="396" height="396" rx="56" fill="url(#tr)"/>
  <rect x="528" y="100" width="396" height="396" rx="56" fill="url(#glass)"/>

  <!-- Bottom-Left -->
  <rect x="100" y="528" width="396" height="396" rx="56" fill="url(#bl)"/>
  <rect x="100" y="528" width="396" height="396" rx="56" fill="url(#glass)"/>

  <!-- Bottom-Right -->
  <rect x="528" y="528" width="396" height="396" rx="56" fill="url(#br)"/>
  <rect x="528" y="528" width="396" height="396" rx="56" fill="url(#glass)"/>

  <!-- Bold A - extra weight for small size legibility -->
  <text x="512" y="645" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="540" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-8">A</text>
</svg>
