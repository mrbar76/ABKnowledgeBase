        prevention_notes:
          type: string
          description: Long-term prevention strategy
        related_workout_id:
          type: string
          format: uuid
          description: Link to the workout that caused it
        training_plan_id:
          type: string
          format: uuid
        tags:
          type: array
          items:
            type: string
        ai_source:
          type: string
          default: chatgpt
