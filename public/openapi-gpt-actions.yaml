    InjuryCreate:
      type: object
      required:
        - title
        - body_area
      properties:
        title:
          type: string
          description: Short description (e.g. "Left shoulder impingement")
        body_area:
          type: string
          description: Body part (e.g. shoulder, knee, lower_back, hip, ankle, wrist)
        side:
          type: string
          enum: [left, right, bilateral, central, "n/a"]
        injury_type:
          type: string
          enum: [strain, sprain, tendinitis, soreness, tightness, pain, fracture, contusion, overuse, other]
          default: strain
        severity:
          type: integer
          minimum: 1
          maximum: 10
          description: "1=minor discomfort, 5=limits some movements, 10=cannot train"
        status:
          type: string
          enum: [active, monitoring, recovering, resolved, chronic]
          default: active
        onset_date:
          type: string
          format: date
        resolved_date:
          type: string
          format: date
