openapi: 3.1.0
info:
  title: AB Brain Unified AI Platform
  version: 1.1.0
  description: |
    AB Brain action for workout logging, training plans, coaching sessions, injury tracking, meal tracking, nutrition context, task creation, and gamification (activity rings, streaks, badges, dynamic goals).

    Gamification: Call GET /gamification to see ring progress (Train/Execute/Recover), streaks, badges, and smart goal suggestions. Use PUT /gamification/settings to adjust ring goals based on the user's capacity. The system auto-suggests raising goals when the user closes a ring 6+/7 days, or lowering when they struggle.
servers:
  - url: https://ab-brain.up.railway.app/api
    description: Production server
security:
  - ApiKeyAuth: []
paths:
  /workouts:
    get:
      operationId: getWorkouts
      summary: Retrieve workout history
      description: Retrieve recent workouts for analysis, reviews, and Spartan project updates.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: workout_type
          in: query
          required: false
          schema:
            type: string
          description: >
            Filter by type (e.g. hill, strength, run, hybrid, recovery, ruck,
            cycling, swim, yoga, crossfit, hiit, class, machine, walk)
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Full-text search query
        - name: tag
          in: query
          required: false
          schema:
            type: string
          description: Filter by tag (e.g. spartan, carry)
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Workouts on or after this date (YYYY-MM-DD)
        - name: before
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Workouts before this date (YYYY-MM-DD)
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum:
              - newest
              - oldest
              - effort_high
              - effort_low
          description: Sort order (default newest)
      responses:
        '200':
          description: List of workouts
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  count:
                    type: integer
                  workouts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Workout'
        '401':
          description: Unauthorized
        '500':
          description: Server error
    post:
      operationId: logWorkout
      summary: Log a Spartan workout
      description: |
        Create a workout entry in AB Brain. Use this after a workout recap.
        Include workout_type, focus, exercises, metrics, body feedback, and adjustments.
        Do NOT send fields that are not listed here — the API will reject unknown fields.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutCreate'
      responses:
        '201':
          description: Workout created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workout'
        '400':
          description: Invalid payload
        '401':
          description: Unauthorized
        '500':
          description: Server error
  /workouts/bulk:
    post:
      operationId: bulkImportWorkouts
      summary: Bulk import multiple workouts at once
      description: |
        Import up to 200 workouts in a single request. Use this for historical imports
        from Apple Health, Fitbod, or any batch data. Each item in the workouts array
        uses the same schema as logWorkout. Send as many fields as you have data for —
        only workout_type is required per entry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - workouts
              properties:
                workouts:
                  type: array
                  maxItems: 200
                  items:
                    $ref: '#/components/schemas/WorkoutCreate'
      responses:
        '201':
          description: Bulk import results
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  imported:
                    type: integer
                  errors:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
        '400':
          description: Invalid payload
        '401':
          description: Unauthorized
        '500':
          description: Server error
  /body-metrics:
    get:
      operationId: getBodyMetrics
      summary: Retrieve body composition measurements
      description: Retrieve body metrics (weight, body fat, muscle mass, etc.) from RENPHO scale data.
      parameters:
        - name: since
          in: query
          schema:
            type: string
            format: date
          description: Start date (inclusive)
        - name: before
          in: query
          schema:
            type: string
            format: date
          description: End date (exclusive)
        - name: latest
          in: query
          schema:
            type: string
            enum: ["true"]
          description: Return only the most recent entry
        - name: source
          in: query
          schema:
            type: string
          description: Filter by source (e.g. RENPHO)
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Body metrics list or single latest entry
          content:
            application/json:
              schema:
                type: object
    post:
      operationId: createBodyMetric
      summary: Create a body composition measurement
      description: Store a body metric entry (e.g. from RENPHO scale). Required fields are measurement_date and weight_lb.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - measurement_date
                - weight_lb
              properties:
                measurement_date:
                  type: string
                  format: date
                measurement_time:
                  type: string
                  nullable: true
                source:
                  type: string
                  default: RENPHO
                source_type:
                  type: string
                  default: smart_scale
                weight_lb:
                  type: number
                bmi:
                  type: number
                  nullable: true
                body_fat_pct:
                  type: number
                  nullable: true
                skeletal_muscle_pct:
                  type: number
                  nullable: true
                fat_free_mass_lb:
                  type: number
                  nullable: true
                subcutaneous_fat_pct:
                  type: number
                  nullable: true
                visceral_fat:
                  type: integer
                  nullable: true
                body_water_pct:
                  type: number
                  nullable: true
                muscle_mass_lb:
                  type: number
                  nullable: true
                bone_mass_lb:
                  type: number
                  nullable: true
                protein_pct:
                  type: number
                  nullable: true
                bmr_kcal:
                  type: integer
                  nullable: true
                metabolic_age:
                  type: integer
                  nullable: true
                measurement_context:
                  type: string
                  nullable: true
                vendor_user_mode:
                  type: string
                  nullable: true
                notes:
                  type: string
                  nullable: true
                tags:
                  type: array
                  items:
                    type: string
                is_manual_entry:
                  type: boolean
                  default: false
                raw_payload:
                  type: object
                  nullable: true
      responses:
        '201':
          description: Created body metric
        '400':
          description: Validation error
  /body-metrics/bulk:
    post:
      operationId: bulkImportBodyMetrics
      summary: Bulk import body metrics (max 200 per request)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - body_metrics
              properties:
                body_metrics:
                  type: array
                  maxItems: 200
                  items:
                    type: object
                    required:
                      - measurement_date
                      - weight_lb
                    properties:
                      measurement_date:
                        type: string
                        format: date
                      weight_lb:
                        type: number
      responses:
        '201':
          description: Bulk import results
  /meals:
    get:
      operationId: getMeals
      summary: List or search meal entries
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Filter by exact date
        - name: meal_type
          in: query
          schema:
            type: string
          description: Filter by type (breakfast, lunch, dinner, snack, pre-workout, post-workout, drink, supplement)
        - name: since
          in: query
          schema:
            type: string
            format: date
        - name: before
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Meals list
    post:
      operationId: createMeal
      summary: Log a meal or snack
      description: Log a meal with macros, timing, and feel ratings. Required fields are title and meal_date.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - meal_date
              properties:
                meal_date:
                  type: string
                  format: date
                meal_time:
                  type: string
                  nullable: true
                meal_type:
                  type: string
                  default: meal
                  enum: [breakfast, lunch, dinner, snack, pre-workout, post-workout, drink, supplement, meal]
                title:
                  type: string
                calories:
                  type: number
                  nullable: true
                protein_g:
                  type: number
                  nullable: true
                carbs_g:
                  type: number
                  nullable: true
                fat_g:
                  type: number
                  nullable: true
                fiber_g:
                  type: number
                  nullable: true
                sugar_g:
                  type: number
                  nullable: true
                sodium_mg:
                  type: number
                  nullable: true
                serving_size:
                  type: string
                  nullable: true
                hunger_before:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 10
                fullness_after:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 10
                energy_after:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 10
                notes:
                  type: string
                  nullable: true
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Created meal
  /meals/bulk:
    post:
      operationId: bulkImportMeals
      summary: Bulk import meals (max 200 per request)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - meals
              properties:
                meals:
                  type: array
                  maxItems: 200
                  items:
                    type: object
                    required:
                      - title
                      - meal_date
                    properties:
                      title:
                        type: string
                      meal_date:
                        type: string
                        format: date
                      calories:
                        type: number
      responses:
        '201':
          description: Bulk import results
  /nutrition/daily-context:
    get:
      operationId: getDailyContext
      summary: Get daily nutrition context (energy, sleep, hydration, cravings)
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Get context for a specific date
      responses:
        '200':
          description: Daily context
    post:
      operationId: createDailyContext
      summary: Create daily nutrition context
      description: Store non-meal daily data like energy, sleep, hydration, cravings, day type. One per date.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - date
              properties:
                date:
                  type: string
                  format: date
                day_type:
                  type: string
                  enum: [rest, strength, run, hill, hybrid, race, travel]
                  nullable: true
                hydration_liters:
                  type: number
                  nullable: true
                energy_rating:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 10
                hunger_rating:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 10
                cravings:
                  type: string
                  nullable: true
                digestion:
                  type: string
                  nullable: true
                sleep_hours:
                  type: number
                  nullable: true
                sleep_quality:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 10
                recovery_rating:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 10
                body_weight_lb:
                  type: number
                  nullable: true
                notes:
                  type: string
                  nullable: true
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Created context
        '409':
          description: Context already exists for this date
  /nutrition/daily-summary:
    get:
      operationId: getDailySummary
      summary: Get computed daily nutrition summary from meals + context
      description: Returns macro totals computed from meals, merged with daily context. Meals listed chronologically.
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Daily summary with meals and context
  /nutrition/daily-summary/range:
    get:
      operationId: getDailySummaryRange
      summary: Get daily summaries for a date range with averages
      parameters:
        - name: since
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: before
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Range summary with daily breakdowns
  /training/plans:
    get:
      operationId: listTrainingPlans
      summary: List or search training plans
      description: Get periodized training blocks, mesocycles, race prep, rehab plans. Filter by status or type.
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Full-text search
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, completed, paused, archived]
        - name: plan_type
          in: query
          schema:
            type: string
            enum: [block, mesocycle, microcycle, deload, race_prep, rehab, custom]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Training plans list
    post:
      operationId: createTrainingPlan
      summary: Create a training plan with goals, phases, weekly structure, and rationale
      description: |
        Store the WHY behind training decisions. Include goal, rationale, constraints (injuries, schedule),
        weekly_structure (day-by-day plan), and progression_notes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainingPlanCreate'
      responses:
        '201':
          description: Created plan
  /training/plans/{id}:
    get:
      operationId: getTrainingPlan
      summary: Get a training plan with linked coaching sessions and injuries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Plan with related coaching sessions and injuries
    put:
      operationId: updateTrainingPlan
      summary: Update a training plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainingPlanCreate'
      responses:
        '200':
          description: Updated plan
  /training/coaching:
    get:
      operationId: listCoachingSessions
      summary: List AI coaching session summaries
      description: Get coaching session notes including injury analysis, adjustments, and next steps.
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: string
            format: date
        - name: before
          in: query
          schema:
            type: string
            format: date
        - name: training_plan_id
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Coaching sessions list
    post:
      operationId: createCoachingSession
      summary: Save a coaching session summary after reviewing training data
      description: |
        After a coaching conversation, save the summary with key_decisions, adjustments,
        injury_notes, nutrition_notes, recovery_notes, and next_steps. Link to a training_plan_id
        and optionally a conversation_id for traceability.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoachingSessionCreate'
      responses:
        '201':
          description: Created session
  /training/coaching/{id}:
    get:
      operationId: getCoachingSession
      summary: Get a coaching session by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Coaching session details
    put:
      operationId: updateCoachingSession
      summary: Update a coaching session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoachingSessionCreate'
      responses:
        '200':
          description: Updated session
  /training/injuries:
    get:
      operationId: listInjuries
      summary: List injuries and contentions
      description: Get injury log with body area, severity, status, and treatment info.
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, monitoring, recovering, resolved, chronic]
        - name: body_area
          in: query
          schema:
            type: string
          description: Filter by body area (e.g. shoulder, knee, lower_back)
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Injuries list
    post:
      operationId: createInjury
      summary: Log an injury or contention
      description: |
        Record an injury with body_area, severity (1-10), symptoms, aggravating_movements,
        treatment, modifications (workout adjustments), and prevention_notes.
        Link to the workout that caused it via related_workout_id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InjuryCreate'
      responses:
        '201':
          description: Created injury
  /training/injuries/{id}:
    get:
      operationId: getInjury
      summary: Get an injury by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Injury details
    put:
      operationId: updateInjury
      summary: Update an injury (change status, add treatment notes)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InjuryCreate'
      responses:
        '200':
          description: Updated injury
  /training/injuries/active/summary:
    get:
      operationId: getActiveInjuriesSummary
      summary: Get all active/monitoring injuries — CHECK THIS before recommending exercises
      description: |
        Returns all injuries with status active or monitoring, ordered by severity.
        Use this at the start of every coaching session to check for contraindications.
      responses:
        '200':
          description: Active injuries with body areas, severity, and modifications
  /training/day/{date}:
    get:
      operationId: getTrainingDayView
      summary: Get complete training day view for a date
      description: |
        Cross-references ALL fitness data for a specific date: workouts, meals,
        nutrition context, body metrics, coaching sessions, active injuries, and
        the current training plan. Use this for comprehensive daily analysis.
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            format: date
          description: Date in YYYY-MM-DD format
      responses:
        '200':
          description: Complete training day view
  /tasks:
    post:
      operationId: createTask
      summary: Create a task
      description: Create a task in AB Brain. Use ai_agent to tag which AI created it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  message:
                    type: string
        '400':
          description: Invalid payload
        '401':
          description: Unauthorized
        '500':
          description: Server error
  /gamification:
    get:
      operationId: getGamification
      summary: Get activity rings, streaks, badges, weekly progress, and smart suggestions
      description: >
        Returns today's ring progress (Train/Execute/Recover), current streaks,
        all badges (unlocked and locked with descriptions), weekly summary,
        nudges for incomplete goals, and smart goal adjustment suggestions based
        on trailing 7-day averages. Train = workouts logged today. Execute = tasks
        completed today. Recover = meals + daily context entries logged today.
        Use streaks data to motivate ("You've got a 12-day train streak!").
        Check suggestions[] for system-recommended goal adjustments.
      responses:
        '200':
          description: Gamification data including rings, streaks, badges, weekly, suggestions, nudges
  /gamification/settings:
    put:
      operationId: updateGamificationSettings
      summary: Update ring goals and notification preferences
      description: >
        Adjust daily ring goals (how many workouts/tasks/recovery entries to
        close each ring), toggle notifications, or modify the notification schedule.
        Use this when the user wants to change their targets or when the system
        suggests a goal adjustment. Goals should match the user's current capacity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ring_train_goal:
                  type: integer
                  minimum: 1
                  maximum: 5
                  description: Workouts per day to close the Train ring
                ring_execute_goal:
                  type: integer
                  minimum: 1
                  maximum: 15
                  description: Tasks completed per day to close the Execute ring
                ring_recover_goal:
                  type: integer
                  minimum: 1
                  maximum: 10
                  description: Meals + daily context entries per day to close the Recover ring
                notification_enabled:
                  type: boolean
                  description: Enable/disable push notifications
                notification_schedule:
                  type: array
                  description: Array of {time, type, label} notification slots
                  items:
                    type: object
                    properties:
                      time:
                        type: string
                        description: 24h time like "06:30"
                      type:
                        type: string
                      label:
                        type: string
      responses:
        '200':
          description: Settings updated
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
  schemas:
    WorkoutCreate:
      type: object
      required:
        - workout_type
      properties:
        workout_type:
          type: string
          description: >
            Any workout type. Common values: hill, strength, run, hybrid, recovery, ruck,
            cycling, swim, yoga, crossfit, hiit, class, machine, walk, hike, rowing, boxing.
            Use whatever best describes the session.
        workout_date:
          type: string
          format: date
          description: YYYY-MM-DD, defaults to today if omitted
        title:
          type: string
          description: Auto-generated as "Workout – DATE – TYPE" if omitted
        location:
          type: string
          description: Where the workout happened (e.g. Runyon Canyon, Home Gym, Equinox)
        elevation:
          type: string
          description: Base elevation if outdoor (e.g. 1,320 ft)
        focus:
          type: string
          description: Goal of the session (e.g. hill durability, upper body hypertrophy, zone 2 cardio)
        warmup:
          type: string
          description: Warm-up activities
        main_sets:
          type: string
          description: Full workout as text — sets x reps @ weight per exercise
        carries:
          type: string
          description: Loaded carries, farmer walks, sled work with distance/weight
        exercises:
          type: array
          description: >
            Structured exercise log. Use this for machine workouts, strength sessions, or
            any workout where you want queryable per-exercise data.
          items:
            type: object
            properties:
              name:
                type: string
                description: Exercise name (e.g. Bench Press, Lat Pulldown, Treadmill)
              sets:
                type: integer
              reps:
                type: integer
                description: Reps per set (or use duration for timed exercises)
              weight:
                type: string
                description: Weight used (e.g. 135 lbs, 60 kg, bodyweight)
              duration:
                type: string
                description: Time for timed exercises (e.g. 30 sec, 5 min)
              distance:
                type: string
                description: Distance for cardio exercises (e.g. 0.5 mi, 500m)
              machine:
                type: string
                description: Machine or equipment used (e.g. cable machine, rower, bike)
              notes:
                type: string
                description: Per-exercise notes (e.g. drop set, tempo 3-1-2, felt easy)
        class_name:
          type: string
          description: Name of the class (e.g. Apple Fitness+ HIIT, Peloton Power Zone, Barry's)
        program:
          type: string
          description: Training program (e.g. Spartan SGX, 5/3/1, Couch to 5K)
        equipment:
          type: string
          description: Primary equipment (e.g. treadmill, bike, barbell, kettlebell, none)
        instructor:
          type: string
          description: Instructor or coach name
        time_duration:
          type: string
          description: Total workout time (e.g. 52 min, 1:23:45)
        distance:
          type: string
          description: Total distance if applicable (e.g. 3.2 mi)
        elevation_gain:
          type: string
          description: Climbing gained (e.g. 850 ft)
        heart_rate_avg:
          type: string
          description: Average heart rate (e.g. 109 bpm)
        heart_rate_max:
          type: string
          description: Max heart rate (e.g. 150 bpm)
        pace_avg:
          type: string
          description: Average pace (e.g. 18:43 /mi, 5:30 /km)
        splits:
          type: string
          description: Per-mile or per-km splits (e.g. Mile 1 16:37 @ 104 bpm)
        cadence_avg:
          type: string
          description: Average cadence (e.g. 104 spm, 85 rpm)
        active_calories:
          type: string
          description: Active calories burned (e.g. 284 kcal)
        total_calories:
          type: string
          description: Total calories burned (e.g. 346 kcal)
        effort:
          type: integer
          minimum: 1
          maximum: 10
          description: Effort rating 1-10
        slowdown_notes:
          type: string
          description: Where you slowed down or broke form
        failure_first:
          type: string
          description: What gave out first (legs, grip, cardio, shoulders, etc.)
        grip_feedback:
          type: string
          description: Grip status (e.g. solid, pumped by set 3, gave out on carries)
        legs_feedback:
          type: string
          description: Legs status (e.g. strong, heavy after hill 4, cramped)
        cardio_feedback:
          type: string
          description: Cardio status (e.g. steady, gasping on final set)
        shoulder_feedback:
          type: string
          description: Shoulder status (e.g. fine, tight on overhead, clicking)
        body_notes:
          type: string
          description: Any other body feedback, soreness, injuries, energy level
        adjustment:
          type: string
          description: What to change next time (weight, pace, volume, rest)
        tags:
          type: array
          items:
            type: string
          description: Lowercase tags without # (e.g. spartan, hill, carry, chest, apple-fitness)
        ai_source:
          type: string
          default: chatgpt
          description: Always set to chatgpt
        metadata:
          type: object
          description: Any additional data that doesn't fit other fields (e.g. Apple Watch metrics, Strava link)
