openapi: 3.1.0
info:
  title: AB Brain Unified AI Platform
  version: 1.1.0
  description: |
    AB Brain action for workout logging, workout retrieval, meal tracking, nutrition context, and task creation.
servers:
  - url: https://ab-brain.up.railway.app/api
    description: Production server
security:
  - ApiKeyAuth: []
paths:
  /workouts:
    get:
      operationId: getWorkouts
      summary: Retrieve workout history
      description: Retrieve recent workouts for analysis, reviews, and Spartan project updates.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: workout_type
          in: query
          required: false
          schema:
            type: string
          description: >
            Filter by type (e.g. hill, strength, run, hybrid, recovery, ruck,
            cycling, swim, yoga, crossfit, hiit, class, machine, walk)
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Full-text search query
        - name: tag
          in: query
          required: false
          schema:
            type: string
          description: Filter by tag (e.g. spartan, carry)
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Workouts on or after this date (YYYY-MM-DD)
        - name: before
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Workouts before this date (YYYY-MM-DD)
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum:
              - newest
              - oldest
              - effort_high
              - effort_low
          description: Sort order (default newest)
      responses:
        '200':
          description: List of workouts
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  count:
                    type: integer
                  workouts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Workout'
        '401':
          description: Unauthorized
        '500':
          description: Server error
    post:
      operationId: logWorkout
      summary: Log a Spartan workout
      description: |
        Create a workout entry in AB Brain. Use this after a workout recap.
        Include workout_type, focus, exercises, metrics, body feedback, and adjustments.
        Do NOT send fields that are not listed here — the API will reject unknown fields.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutCreate'
      responses:
        '201':
          description: Workout created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workout'
        '400':
          description: Invalid payload
        '401':
          description: Unauthorized
        '500':
          description: Server error
  /workouts/bulk:
    post:
      operationId: bulkImportWorkouts
      summary: Bulk import multiple workouts at once
      description: |
        Import up to 200 workouts in a single request. Use this for historical imports
        from Apple Health, Fitbod, or any batch data. Each item in the workouts array
        uses the same schema as logWorkout. Send as many fields as you have data for —
        only workout_type is required per entry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - workouts
              properties:
                workouts:
                  type: array
                  maxItems: 200
                  items:
                    $ref: '#/components/schemas/WorkoutCreate'
      responses:
        '201':
          description: Bulk import results
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  imported:
                    type: integer
                  errors:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
        '400':
          description: Invalid payload
        '401':
          description: Unauthorized
        '500':
          description: Server error
  /body-metrics:
    get:
      operationId: getBodyMetrics
      summary: Retrieve body composition measurements
      description: Retrieve body metrics (weight, body fat, muscle mass, etc.) from RENPHO scale data.
      parameters:
        - name: since
          in: query
          schema:
            type: string
            format: date
          description: Start date (inclusive)
        - name: before
          in: query
          schema:
            type: string
            format: date
          description: End date (exclusive)
        - name: latest
          in: query
          schema:
            type: string
            enum: ["true"]
          description: Return only the most recent entry
        - name: source
          in: query
          schema:
            type: string
          description: Filter by source (e.g. RENPHO)
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Body metrics list or single latest entry
          content:
            application/json:
              schema:
                type: object
    post:
      operationId: createBodyMetric
      summary: Create a body composition measurement
      description: Store a body metric entry (e.g. from RENPHO scale). Required fields are measurement_date and weight_lb.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - measurement_date
                - weight_lb
              properties:
                measurement_date:
                  type: string
                  format: date
                measurement_time:
                  type: string
                  nullable: true
                source:
                  type: string
                  default: RENPHO
                source_type:
                  type: string
                  default: smart_scale
                weight_lb:
                  type: number
                bmi:
                  type: number
                  nullable: true
                body_fat_pct:
                  type: number
                  nullable: true
                skeletal_muscle_pct:
                  type: number
                  nullable: true
                fat_free_mass_lb:
                  type: number
                  nullable: true
                subcutaneous_fat_pct:
                  type: number
                  nullable: true
                visceral_fat:
                  type: integer
                  nullable: true
                body_water_pct:
                  type: number
                  nullable: true
                muscle_mass_lb:
                  type: number
                  nullable: true
                bone_mass_lb:
                  type: number
                  nullable: true
                protein_pct:
                  type: number
                  nullable: true
                bmr_kcal:
                  type: integer
                  nullable: true
                metabolic_age:
                  type: integer
                  nullable: true
                measurement_context:
                  type: string
                  nullable: true
                vendor_user_mode:
                  type: string
                  nullable: true
                notes:
                  type: string
                  nullable: true
                tags:
                  type: array
                  items:
                    type: string
                is_manual_entry:
                  type: boolean
                  default: false
                raw_payload:
                  type: object
                  nullable: true
      responses:
        '201':
          description: Created body metric
        '400':
          description: Validation error
  /body-metrics/bulk:
    post:
      operationId: bulkImportBodyMetrics
      summary: Bulk import body metrics (max 200 per request)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - body_metrics
              properties:
                body_metrics:
                  type: array
                  maxItems: 200
                  items:
                    type: object
                    required:
                      - measurement_date
                      - weight_lb
                    properties:
                      measurement_date:
                        type: string
                        format: date
                      weight_lb:
                        type: number
      responses:
        '201':
          description: Bulk import results
  /meals:
    get:
      operationId: getMeals
      summary: List or search meal entries
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Filter by exact date
        - name: meal_type
          in: query
          schema:
            type: string
          description: Filter by type (breakfast, lunch, dinner, snack, pre-workout, post-workout, drink, supplement)
        - name: since
          in: query
          schema:
            type: string
            format: date
        - name: before
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Meals list
    post:
      operationId: createMeal
      summary: Log a meal or snack
      description: Log a meal with macros, timing, and feel ratings. Required fields are title and meal_date.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - meal_date
              properties:
                meal_date:
                  type: string
                  format: date
                meal_time:
                  type: string
                  nullable: true
                meal_type:
                  type: string
                  default: meal
                  enum: [breakfast, lunch, dinner, snack, pre-workout, post-workout, drink, supplement, meal]
                title:
                  type: string
                calories:
                  type: number
                  nullable: true
                protein_g:
                  type: number
                  nullable: true
                carbs_g:
                  type: number
                  nullable: true
                fat_g:
                  type: number
                  nullable: true
                fiber_g:
                  type: number
                  nullable: true
                sugar_g:
                  type: number
                  nullable: true
                sodium_mg:
                  type: number
                  nullable: true
                serving_size:
                  type: string
                  nullable: true
                hunger_before:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 10
                fullness_after:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 10
                energy_after:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 10
                notes:
                  type: string
                  nullable: true
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Created meal
  /meals/bulk:
    post:
      operationId: bulkImportMeals
      summary: Bulk import meals (max 200 per request)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - meals
              properties:
                meals:
                  type: array
                  maxItems: 200
                  items:
                    type: object
                    required:
                      - title
                      - meal_date
                    properties:
                      title:
                        type: string
                      meal_date:
                        type: string
                        format: date
                      calories:
                        type: number
      responses:
        '201':
          description: Bulk import results
  /nutrition/daily-context:
    get:
      operationId: getDailyContext
      summary: Get daily nutrition context (energy, sleep, hydration, cravings)
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Get context for a specific date
      responses:
        '200':
          description: Daily context
    post:
      operationId: createDailyContext
      summary: Create daily nutrition context
      description: Store non-meal daily data like energy, sleep, hydration, cravings, day type. One per date.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - date
              properties:
                date:
                  type: string
                  format: date
                day_type:
                  type: string
                  enum: [rest, strength, run, hill, hybrid, race, travel]
                  nullable: true
                hydration_liters:
                  type: number
                  nullable: true
                energy_rating:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 10
                hunger_rating:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 10
                cravings:
                  type: string
                  nullable: true
                digestion:
                  type: string
                  nullable: true
                sleep_hours:
                  type: number
                  nullable: true
                sleep_quality:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 10
                recovery_rating:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 10
                body_weight_lb:
                  type: number
                  nullable: true
                notes:
                  type: string
                  nullable: true
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Created context
        '409':
          description: Context already exists for this date
  /nutrition/daily-summary:
    get:
      operationId: getDailySummary
      summary: Get computed daily nutrition summary from meals + context
      description: Returns macro totals computed from meals, merged with daily context. Meals listed chronologically.
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Daily summary with meals and context
  /nutrition/daily-summary/range:
    get:
      operationId: getDailySummaryRange
      summary: Get daily summaries for a date range with averages
      parameters:
        - name: since
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: before
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Range summary with daily breakdowns
  /tasks:
    post:
      operationId: createTask
      summary: Create a task
      description: Create a task in AB Brain. Use ai_agent to tag which AI created it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  message:
                    type: string
        '400':
          description: Invalid payload
        '401':
          description: Unauthorized
        '500':
          description: Server error
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
  schemas:
    WorkoutCreate:
      type: object
      required:
        - workout_type
      properties:
        workout_type:
          type: string
          description: >
            Any workout type. Common values: hill, strength, run, hybrid, recovery, ruck,
            cycling, swim, yoga, crossfit, hiit, class, machine, walk, hike, rowing, boxing.
            Use whatever best describes the session.
        workout_date:
          type: string
          format: date
          description: YYYY-MM-DD, defaults to today if omitted
        title:
          type: string
          description: Auto-generated as "Workout – DATE – TYPE" if omitted
        location:
          type: string
          description: Where the workout happened (e.g. Runyon Canyon, Home Gym, Equinox)
        elevation:
          type: string
          description: Base elevation if outdoor (e.g. 1,320 ft)
        focus:
          type: string
          description: Goal of the session (e.g. hill durability, upper body hypertrophy, zone 2 cardio)
        warmup:
          type: string
          description: Warm-up activities
        main_sets:
          type: string
          description: Full workout as text — sets x reps @ weight per exercise
        carries:
          type: string
          description: Loaded carries, farmer walks, sled work with distance/weight
        exercises:
          type: array
          description: >
            Structured exercise log. Use this for machine workouts, strength sessions, or
            any workout where you want queryable per-exercise data.
          items:
            type: object
            properties:
              name:
                type: string
                description: Exercise name (e.g. Bench Press, Lat Pulldown, Treadmill)
              sets:
                type: integer
              reps:
                type: integer
                description: Reps per set (or use duration for timed exercises)
              weight:
                type: string
                description: Weight used (e.g. 135 lbs, 60 kg, bodyweight)
              duration:
                type: string
                description: Time for timed exercises (e.g. 30 sec, 5 min)
              distance:
                type: string
                description: Distance for cardio exercises (e.g. 0.5 mi, 500m)
              machine:
                type: string
                description: Machine or equipment used (e.g. cable machine, rower, bike)
              notes:
                type: string
                description: Per-exercise notes (e.g. drop set, tempo 3-1-2, felt easy)
        class_name:
          type: string
          description: Name of the class (e.g. Apple Fitness+ HIIT, Peloton Power Zone, Barry's)
        program:
          type: string
          description: Training program (e.g. Spartan SGX, 5/3/1, Couch to 5K)
        equipment:
          type: string
          description: Primary equipment (e.g. treadmill, bike, barbell, kettlebell, none)
        instructor:
          type: string
          description: Instructor or coach name
        time_duration:
          type: string
          description: Total workout time (e.g. 52 min, 1:23:45)
        distance:
          type: string
          description: Total distance if applicable (e.g. 3.2 mi)
        elevation_gain:
          type: string
          description: Climbing gained (e.g. 850 ft)
        heart_rate_avg:
          type: string
          description: Average heart rate (e.g. 109 bpm)
        heart_rate_max:
          type: string
          description: Max heart rate (e.g. 150 bpm)
        pace_avg:
          type: string
          description: Average pace (e.g. 18:43 /mi, 5:30 /km)
        splits:
          type: string
          description: Per-mile or per-km splits (e.g. Mile 1 16:37 @ 104 bpm)
        cadence_avg:
          type: string
          description: Average cadence (e.g. 104 spm, 85 rpm)
        active_calories:
          type: string
          description: Active calories burned (e.g. 284 kcal)
        total_calories:
          type: string
          description: Total calories burned (e.g. 346 kcal)
        effort:
          type: integer
          minimum: 1
          maximum: 10
          description: Effort rating 1-10
        slowdown_notes:
          type: string
          description: Where you slowed down or broke form
        failure_first:
          type: string
          description: What gave out first (legs, grip, cardio, shoulders, etc.)
        grip_feedback:
          type: string
          description: Grip status (e.g. solid, pumped by set 3, gave out on carries)
        legs_feedback:
          type: string
          description: Legs status (e.g. strong, heavy after hill 4, cramped)
        cardio_feedback:
          type: string
          description: Cardio status (e.g. steady, gasping on final set)
        shoulder_feedback:
          type: string
          description: Shoulder status (e.g. fine, tight on overhead, clicking)
        body_notes:
          type: string
          description: Any other body feedback, soreness, injuries, energy level
        adjustment:
          type: string
          description: What to change next time (weight, pace, volume, rest)
        tags:
          type: array
          items:
            type: string
          description: Lowercase tags without # (e.g. spartan, hill, carry, chest, apple-fitness)
        ai_source:
          type: string
          default: chatgpt
          description: Always set to chatgpt
        metadata:
          type: object
          description: Any additional data that doesn't fit other fields (e.g. Apple Watch metrics, Strava link)
    Workout:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        workout_date:
          type: string
          format: date
        workout_type:
          type: string
        location:
          type: string
        elevation:
          type: string
        focus:
          type: string
        warmup:
          type: string
        main_sets:
          type: string
        carries:
          type: string
        exercises:
          type: array
          items:
            type: object
        class_name:
          type: string
        program:
          type: string
        equipment:
          type: string
        instructor:
          type: string
        time_duration:
          type: string
        distance:
          type: string
        elevation_gain:
          type: string
        heart_rate_avg:
          type: string
        heart_rate_max:
          type: string
        pace_avg:
          type: string
        splits:
          type: string
        cadence_avg:
          type: string
        active_calories:
          type: string
        total_calories:
          type: string
        effort:
          type: integer
        slowdown_notes:
          type: string
        failure_first:
          type: string
        grip_feedback:
          type: string
        legs_feedback:
          type: string
        cardio_feedback:
          type: string
        shoulder_feedback:
          type: string
        body_notes:
          type: string
        adjustment:
          type: string
        tags:
          type: array
          items:
            type: string
        ai_source:
          type: string
        source:
          type: string
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TaskCreate:
      type: object
      additionalProperties: false
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        project_id:
          type: string
          format: uuid
          description: Link task to a project
        status:
          type: string
          enum:
            - todo
            - in_progress
            - review
            - done
          default: todo
        priority:
          type: string
          enum:
            - low
            - medium
            - high
            - urgent
          default: medium
        ai_agent:
          type: string
          default: chatgpt
          description: Which AI created the task
        next_steps:
          type: string
          description: Next actions or follow-up notes
