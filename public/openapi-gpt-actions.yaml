openapi: 3.1.0
info:
  title: AB Brain Unified AI Platform
  version: 1.1.0
  description: |
    AB Brain action for workout logging, daily plans, coaching sessions, injury tracking, meal tracking, nutrition context, task creation, and gamification (activity rings, streaks, badges, dynamic goals).

    IMPORTANT: All planning uses /daily-plans endpoints. The /training/plans endpoint is REMOVED. Use POST /daily-plans for single-day plans, POST /daily-plans/week for weekly batch creation.

    Daily Context is simplified — only 4 fields: sleep_hours, sleep_quality (1-10), hydration_liters, notes (free text). No energy_rating, hunger_rating, recovery_rating, body_weight_lb, cravings, digestion, day_type — these are ALL REMOVED. Weight goes in POST /body-metrics.

    Gamification: Call GET /gamification to see ring progress (Train/Execute/Recover), streaks, badges, and smart goal suggestions. Use PUT /gamification/settings to adjust ring goals based on the user's capacity. The system auto-suggests raising goals when the user closes a ring 6+/7 days, or lowering when they struggle.
servers:
  - url: https://ab-brain.up.railway.app/api
    description: Production server
security:
  - ApiKeyAuth: []
paths:
  /workouts:
    get:
      operationId: getWorkouts
      summary: Retrieve workout history
      description: Retrieve recent workouts for analysis, reviews, and Spartan project updates.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: workout_type
          in: query
          required: false
          schema:
            type: string
          description: >
            Filter by type (e.g. hill, strength, run, hybrid, recovery, ruck,
            cycling, swim, yoga, crossfit, hiit, class, machine, walk)
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Full-text search query
        - name: tag
          in: query
          required: false
          schema:
            type: string
          description: Filter by tag (e.g. spartan, carry)
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Workouts on or after this date (YYYY-MM-DD)
        - name: before
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Workouts before this date (YYYY-MM-DD)
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum:
              - newest
              - oldest
              - effort_high
              - effort_low
          description: Sort order (default newest)
      responses:
        '200':
          description: List of workouts
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  count:
                    type: integer
                  workouts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Workout'
        '401':
          description: Unauthorized
        '500':
          description: Server error
    post:
      operationId: logWorkout
      summary: Log a Spartan workout
      description: |
        Create a workout entry in AB Brain. Use this after a workout recap.
        Include workout_type, focus, exercises, metrics, body feedback, and adjustments.
        Do NOT send fields that are not listed here — the API will reject unknown fields.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutCreate'
      responses:
        '201':
          description: Workout created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workout'
        '400':
          description: Invalid payload
        '401':
          description: Unauthorized
        '500':
          description: Server error
  /workouts/bulk:
    post:
      operationId: bulkImportWorkouts
      summary: Bulk import multiple workouts at once
      description: |
        Import up to 200 workouts in a single request. Use this for historical imports
        from Apple Health, Fitbod, or any batch data. Each item in the workouts array
        uses the same schema as logWorkout. Send as many fields as you have data for —
        only workout_type is required per entry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - workouts
              properties:
                workouts:
                  type: array
                  maxItems: 200
                  items:
                    $ref: '#/components/schemas/WorkoutCreate'
      responses:
        '201':
          description: Bulk import results
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  imported:
                    type: integer
                  errors:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
        '400':
          description: Invalid payload
        '401':
          description: Unauthorized
        '500':
          description: Server error
  /workouts/{id}:
    put:
      operationId: updateWorkout
      summary: Update a workout by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutCreate'
      responses:
        '200':
          description: Updated workout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workout'
        '404':
          description: Workout not found
        '401':
          description: Unauthorized
  /exercises:
    get:
      operationId: listExercises
      summary: Search the exercise catalog — 1060+ exercises with equipment, muscle groups, level, and muscle_strength_score (mscore 0-100, higher=more effective for building strength)
      description: |
        Returns exercises sorted by muscle_strength_score (mscore) descending by default.
        mscore 90-100 = elite compound movements (primary lifts), 70-89 = strong accessories, 50-69 = moderate/isolation, below 50 = light/stabilizer.
        sets_logged = popularity across Fitbod users.
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Full-text search across name, equipment, muscle groups, description
        - name: level
          in: query
          schema:
            type: string
            enum: [beginner, intermediate, advanced]
        - name: equipment
          in: query
          schema:
            type: string
          description: Filter by equipment (e.g. Barbell, Dumbbell, Cable, Body Weight, Kettlebell)
        - name: category
          in: query
          schema:
            type: string
          description: Filter by muscle category (e.g. chest, back, shoulders, legs, arms, core, lower_back)
        - name: muscle_group
          in: query
          schema:
            type: string
          description: Filter by primary muscle group (partial match)
        - name: sort
          in: query
          schema:
            type: string
            enum: [mscore_desc, mscore_asc, name, sets_logged, level]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Exercise catalog results
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  count:
                    type: integer
                  exercises:
                    type: array
                    items:
                      $ref: '#/components/schemas/Exercise'
  /exercises/equipment:
    get:
      operationId: listExerciseEquipment
      summary: Get all equipment types in the exercise catalog with counts
      responses:
        '200':
          description: Equipment list
  /exercises/categories:
    get:
      operationId: listExerciseCategories
      summary: Get all muscle categories in the exercise catalog with counts
      responses:
        '200':
          description: Category list
  /exercises/stats:
    get:
      operationId: getExerciseStats
      summary: Get exercise catalog statistics — totals by level/equipment/category, top exercises by mscore
      responses:
        '200':
          description: Exercise stats
  /gym-profiles:
    get:
      operationId: listGymProfiles
      summary: List all gym profiles with their equipment
      responses:
        '200':
          description: List of gym profiles
    post:
      operationId: createGymProfile
      summary: Create a gym profile with available equipment list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GymProfileInput'
      responses:
        '201':
          description: Created
  /gym-profiles/primary:
    get:
      operationId: getPrimaryGymProfile
      summary: Get the primary gym profile — check this before recommending exercises
      responses:
        '200':
          description: Primary gym profile
  /gym-profiles/{id}:
    put:
      operationId: updateGymProfile
      summary: Update gym profile name, equipment, or primary status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GymProfileInput'
      responses:
        '200':
          description: Updated
    delete:
      operationId: deleteGymProfile
      summary: Delete a gym profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted
  /body-metrics:
    get:
      operationId: getBodyMetrics
      summary: Retrieve body composition measurements
      description: Retrieve body metrics (weight, body fat, muscle mass, etc.) from RENPHO scale data.
      parameters:
        - name: since
          in: query
          schema:
            type: string
            format: date
          description: Start date (inclusive)
        - name: before
          in: query
          schema:
            type: string
            format: date
          description: End date (exclusive)
        - name: latest
          in: query
          schema:
            type: string
            enum: ["true"]
          description: Return only the most recent entry
        - name: source
          in: query
          schema:
            type: string
          description: Filter by source (e.g. RENPHO)
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Body metrics list or single latest entry
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        measurement_date:
                          type: string
                          format: date
                        weight_lb:
                          type: number
                        body_fat_pct:
                          type: number
                        muscle_mass_lb:
                          type: number
                        source:
                          type: string
                  total:
                    type: integer
    post:
      operationId: createBodyMetric
      summary: Create a body composition measurement
      description: Store a body metric entry (e.g. from RENPHO scale). Required fields are measurement_date and weight_lb.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - measurement_date
                - weight_lb
              properties:
                measurement_date:
                  type: string
                  format: date
                measurement_time:
                  type: string
                  nullable: true
                source:
                  type: string
                  default: RENPHO
                source_type:
                  type: string
                  default: smart_scale
                weight_lb:
                  type: number
                bmi:
                  type: number
                  nullable: true
                body_fat_pct:
                  type: number
                  nullable: true
                skeletal_muscle_pct:
                  type: number
                  nullable: true
                fat_free_mass_lb:
                  type: number
                  nullable: true
                subcutaneous_fat_pct:
                  type: number
                  nullable: true
                visceral_fat:
                  type: integer
                  nullable: true
                body_water_pct:
                  type: number
                  nullable: true
                muscle_mass_lb:
                  type: number
                  nullable: true
                bone_mass_lb:
                  type: number
                  nullable: true
                protein_pct:
                  type: number
                  nullable: true
                bmr_kcal:
                  type: integer
                  nullable: true
                metabolic_age:
                  type: integer
                  nullable: true
                measurement_context:
                  type: string
                  nullable: true
                vendor_user_mode:
                  type: string
                  nullable: true
                notes:
                  type: string
                  nullable: true
                tags:
                  type: array
                  items:
                    type: string
                is_manual_entry:
                  type: boolean
                  default: false
                raw_payload:
                  type: object
                  nullable: true
      responses:
        '201':
          description: Created body metric
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  measurement_date:
                    type: string
                    format: date
                  weight_lb:
                    type: number
                  body_fat_pct:
                    type: number
                  source:
                    type: string
        '400':
          description: Validation error
  /body-metrics/bulk:
    post:
      operationId: bulkImportBodyMetrics
      summary: Bulk import body metrics (max 200 per request)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - body_metrics
              properties:
                body_metrics:
                  type: array
                  maxItems: 200
                  items:
                    type: object
                    required:
                      - measurement_date
                      - weight_lb
                    properties:
                      measurement_date:
                        type: string
                        format: date
                      weight_lb:
                        type: number
      responses:
        '201':
          description: Bulk import results
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  imported:
                    type: integer
                  errors:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
  /body-metrics/{id}:
    patch:
      operationId: patchBodyMetric
      summary: Partially update a body metric entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                weight_lb:
                  type: number
                body_fat_pct:
                  type: number
                muscle_mass_lb:
                  type: number
                notes:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Updated body metric
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  measurement_date:
                    type: string
                    format: date
                  weight_lb:
                    type: number
                  body_fat_pct:
                    type: number
                  muscle_mass_lb:
                    type: number
        '404':
          description: Body metric not found
  /meals:
    get:
      operationId: getMeals
      summary: List or search meal entries
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Filter by exact date
        - name: meal_type
          in: query
          schema:
            type: string
          description: Filter by type (breakfast, lunch, dinner, snack, pre-workout, post-workout, drink, supplement)
        - name: since
          in: query
          schema:
            type: string
            format: date
        - name: before
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Meals list
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  count:
                    type: integer
                  meals:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        meal_date:
                          type: string
                          format: date
                        meal_type:
                          type: string
                        calories:
                          type: number
    post:
      operationId: createMeal
      summary: Log a meal or snack
      description: Log a meal with macros, timing, and feel ratings. Required fields are title and meal_date.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - meal_date
              properties:
                meal_date:
                  type: string
                  format: date
                meal_time:
                  type: string
                  nullable: true
                meal_type:
                  type: string
                  default: meal
                  enum: [breakfast, lunch, dinner, snack, pre-workout, post-workout, drink, supplement, meal]
                title:
                  type: string
                calories:
                  type: number
                  nullable: true
                protein_g:
                  type: number
                  nullable: true
                carbs_g:
                  type: number
                  nullable: true
                fat_g:
                  type: number
                  nullable: true
                fiber_g:
                  type: number
                  nullable: true
                sugar_g:
                  type: number
                  nullable: true
                sodium_mg:
                  type: number
                  nullable: true
                serving_size:
                  type: string
                  nullable: true
                hunger_before:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 10
                fullness_after:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 10
                energy_after:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 10
                notes:
                  type: string
                  nullable: true
                tags:
                  type: array
                  items:
                    type: string
                source:
                  type: string
                  description: Where the meal data came from (e.g. manual, myfitnesspal, apple-health)
                ai_source:
                  type: string
                  default: chatgpt
                  description: Which AI agent logged this meal
                metadata:
                  type: object
                  additionalProperties: true
                  description: Any additional data that doesn't fit other fields
      responses:
        '201':
          description: Created meal
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  meal_date:
                    type: string
                    format: date
                  meal_type:
                    type: string
                  calories:
                    type: number
  /meals/{id}:
    get:
      operationId: getMeal
      summary: Get a single meal by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Single meal
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  meal_date:
                    type: string
                    format: date
                  meal_time:
                    type: string
                    nullable: true
                  meal_type:
                    type: string
                  title:
                    type: string
                  calories:
                    type: number
                    nullable: true
                  protein_g:
                    type: number
                    nullable: true
                  carbs_g:
                    type: number
                    nullable: true
                  fat_g:
                    type: number
                    nullable: true
                  fiber_g:
                    type: number
                    nullable: true
                  sugar_g:
                    type: number
                    nullable: true
                  sodium_mg:
                    type: number
                    nullable: true
                  serving_size:
                    type: string
                    nullable: true
                  notes:
                    type: string
                    nullable: true
                  tags:
                    type: array
                    items:
                      type: string
                  source:
                    type: string
                  ai_source:
                    type: string
                    nullable: true
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
    patch:
      operationId: patchMeal
      summary: Partially update a meal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                meal_type:
                  type: string
                calories:
                  type: number
                protein_g:
                  type: number
                carbs_g:
                  type: number
                fat_g:
                  type: number
                notes:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Updated meal
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  meal_type:
                    type: string
                  calories:
                    type: number
        '404':
          description: Meal not found
  /meals/bulk:
    post:
      operationId: bulkImportMeals
      summary: Bulk import meals (max 200 per request)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - meals
              properties:
                meals:
                  type: array
                  maxItems: 200
                  items:
                    type: object
                    required:
                      - title
                      - meal_date
                    properties:
                      title:
                        type: string
                      meal_date:
                        type: string
                        format: date
                      calories:
                        type: number
      responses:
        '201':
          description: Bulk import results
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  imported:
                    type: integer
                  errors:
                    type: integer
  /daily-plans:
    get:
      operationId: listDailyPlans
      summary: List daily plans for a date range
      description: "Get daily training plans. Use from/to for date range. NEVER use /training/plans — that endpoint is removed."
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
          description: Start date (YYYY-MM-DD)
        - name: to
          in: query
          schema:
            type: string
            format: date
          description: End date (YYYY-MM-DD)
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Daily plans list
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/DailyPlan'
    post:
      operationId: createDailyPlan
      summary: Create a daily plan for a specific date
      description: |
        Create a single-day training plan. plan_date is required and must be unique.
        Use POST /daily-plans/week for batch creation.
        NEVER use /training/plans — that endpoint is removed. All planning goes through /daily-plans.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DailyPlanCreate'
      responses:
        '201':
          description: Created daily plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyPlan'
        '409':
          description: Plan already exists for this date
  /daily-plans/week:
    post:
      operationId: createWeeklyPlans
      summary: Create 7 daily plans at once starting from a date
      description: Create a full week of plans. Send start_date and an array of 7 day objects.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - start_date
                - days
              properties:
                start_date:
                  type: string
                  format: date
                days:
                  type: array
                  maxItems: 7
                  items:
                    $ref: '#/components/schemas/DailyPlanCreate'
      responses:
        '201':
          description: Created weekly plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: integer
                  skipped:
                    type: integer
                  plans:
                    type: array
                    items:
                      $ref: '#/components/schemas/DailyPlan'
  /daily-plans/{id}:
    put:
      operationId: updateDailyPlan
      summary: Update a daily plan by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DailyPlanCreate'
      responses:
        '200':
          description: Updated daily plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyPlan'
        '404':
          description: Plan not found
  /daily-plans/{id}/review:
    get:
      operationId: reviewDailyPlan
      summary: Review a daily plan with actual results — plan vs actual comparison with workouts, meals, nutrition, injuries, and summary stats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Plan with actual data and comparison summary
  /nutrition/daily-context:
    get:
      operationId: getDailyContext
      summary: Get daily nutrition context (sleep, hydration, notes)
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Get context for a specific date
      responses:
        '200':
          description: Daily context
          content:
