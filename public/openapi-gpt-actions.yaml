  /training/day/{date}:
    get:
      operationId: getTrainingDayView
      summary: Get complete training day view for a date
      description: |
        Cross-references ALL fitness data for a specific date: workouts, meals,
        nutrition context, body metrics, coaching sessions, active injuries, and
        the current training plan. Use this for comprehensive daily analysis.
