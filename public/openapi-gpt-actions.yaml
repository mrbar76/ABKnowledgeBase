          description: Complete training day view
          content:
            application/json:
              schema:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                  workouts:
                    type: array
                    items:
                      type: object
                  meals:
                    type: array
                    items:
                      type: object
                  body_metrics:
                    type: array
                    items:
                      type: object
                  coaching_sessions:
                    type: array
                    items:
                      type: object
                  active_injuries:
                    type: array
                    items:
                      type: object
  /tasks:
    post:
      operationId: createTask
      summary: Create a task
      description: Create a task in AB Brain. Use ai_agent to tag which AI created it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  message:
                    type: string
        '400':
          description: Invalid payload
        '401':
          description: Unauthorized
        '500':
          description: Server error
  /gamification:
    get:
      operationId: getGamification
      summary: Get activity rings, streaks, badges, weekly progress, and smart suggestions
      description: >
        Returns today's ring progress (Train/Execute/Recover), current streaks,
        all badges (unlocked and locked), weekly summary, nudges, and smart goal
        adjustment suggestions based on trailing 7-day averages. Shows current
        momentum and consistency.
      responses:
        '200':
          description: Gamification data including rings, streaks, badges, weekly, suggestions, nudges
          content:
            application/json:
              schema:
                type: object
                properties:
                  rings:
                    type: object
                  streaks:
                    type: object
                  badges:
                    type: array
                    items:
                      type: object
                  weekly:
                    type: object
                  suggestions:
                    type: array
                    items:
                      type: object
                  nudges:
                    type: array
                    items:
                      type: string
  /gamification/settings:
    put:
      operationId: updateGamificationSettings
      summary: Update ring goals and notification preferences
      description: >
        Adjust daily ring goals (how many workouts/tasks/recovery entries to
        close each ring), toggle notifications, or modify the notification schedule.
        Use this when the user wants to change their targets or when the system
        suggests a goal adjustment. Goals should match the user's current capacity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ring_train_goal:
                  type: integer
                  minimum: 1
                  maximum: 5
                  description: Workouts per day to close the Train ring
                ring_execute_goal:
                  type: integer
                  minimum: 1
                  maximum: 15
                  description: Tasks completed per day to close the Execute ring
                ring_recover_goal:
                  type: integer
                  minimum: 1
                  maximum: 10
                  description: Meals + daily context entries per day to close the Recover ring
                notification_enabled:
                  type: boolean
                  description: Enable/disable push notifications
                notification_schedule:
                  type: array
                  description: Array of {time, type, label} notification slots
                  items:
                    type: object
                    properties:
                      time:
                        type: string
                        description: 24h time like "06:30"
                      type:
                        type: string
                      label:
                        type: string
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ring_train_goal:
                    type: integer
                  ring_execute_goal:
                    type: integer
                  ring_recover_goal:
                    type: integer
                  notification_enabled:
                    type: boolean
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
  schemas:
    WorkoutCreate:
      type: object
      required:
        - workout_type
      properties:
        workout_type:
          type: string
          description: >
            Any workout type. Common values: hill, strength, run, hybrid, recovery, ruck,
            cycling, swim, yoga, crossfit, hiit, class, machine, walk, hike, rowing, boxing.
            Use whatever best describes the session.
        workout_date:
          type: string
          format: date
          description: YYYY-MM-DD, defaults to today if omitted
        title:
          type: string
          description: Auto-generated as "Workout – DATE – TYPE" if omitted
        location:
          type: string
          description: Where the workout happened (e.g. Runyon Canyon, Home Gym, Equinox)
        elevation:
          type: string
          description: Base elevation if outdoor (e.g. 1,320 ft)
        focus:
          type: string
          description: Goal of the session (e.g. hill durability, upper body hypertrophy, zone 2 cardio)
        warmup:
          type: string
          description: Warm-up activities
        main_sets:
          type: string
          description: Full workout as text — sets x reps @ weight per exercise
        carries:
          type: string
          description: Loaded carries, farmer walks, sled work with distance/weight
        exercises:
          type: array
          description: >
            Structured exercise log. Use this for machine workouts, strength sessions, or
            any workout where you want queryable per-exercise data.
          items:
            type: object
            properties:
              name:
                type: string
                description: Exercise name (e.g. Bench Press, Lat Pulldown, Treadmill)
              sets:
                type: integer
              reps:
                type: integer
                description: Reps per set (or use duration for timed exercises)
              weight:
                type: string
                description: Weight used (e.g. 135 lbs, 60 kg, bodyweight)
              duration:
                type: string
                description: Time for timed exercises (e.g. 30 sec, 5 min)
              distance:
                type: string
                description: Distance for cardio exercises (e.g. 0.5 mi, 500m)
              machine:
                type: string
                description: Machine or equipment used (e.g. cable machine, rower, bike)
              notes:
                type: string
                description: Per-exercise notes (e.g. drop set, tempo 3-1-2, felt easy)
        class_name:
          type: string
          description: Name of the class (e.g. Apple Fitness+ HIIT, Peloton Power Zone, Barry's)
        program:
          type: string
          description: Training program (e.g. Spartan SGX, 5/3/1, Couch to 5K)
        equipment:
          type: string
          description: Primary equipment (e.g. treadmill, bike, barbell, kettlebell, none)
        instructor:
          type: string
          description: Instructor or coach name
        time_duration:
          type: string
          description: Total workout time (e.g. 52 min, 1:23:45)
        distance:
          type: string
          description: Total distance if applicable (e.g. 3.2 mi)
        elevation_gain:
          type: string
          description: Climbing gained (e.g. 850 ft)
        heart_rate_avg:
          type: string
          description: Average heart rate (e.g. 109 bpm)
        heart_rate_max:
          type: string
          description: Max heart rate (e.g. 150 bpm)
        pace_avg:
          type: string
          description: Average pace (e.g. 18:43 /mi, 5:30 /km)
        splits:
          type: string
          description: Per-mile or per-km splits (e.g. Mile 1 16:37 @ 104 bpm)
        cadence_avg:
          type: string
          description: Average cadence (e.g. 104 spm, 85 rpm)
        active_calories:
          type: string
          description: Active calories burned (e.g. 284 kcal)
        total_calories:
          type: string
          description: Total calories burned (e.g. 346 kcal)
        effort:
          type: integer
          minimum: 1
          maximum: 10
          description: Effort rating 1-10
        slowdown_notes:
          type: string
          description: Where you slowed down or broke form
        failure_first:
          type: string
          description: What gave out first (legs, grip, cardio, shoulders, etc.)
        grip_feedback:
          type: string
          description: Grip status (e.g. solid, pumped by set 3, gave out on carries)
        legs_feedback:
          type: string
          description: Legs status (e.g. strong, heavy after hill 4, cramped)
        cardio_feedback:
          type: string
          description: Cardio status (e.g. steady, gasping on final set)
        shoulder_feedback:
          type: string
          description: Shoulder status (e.g. fine, tight on overhead, clicking)
        body_notes:
          type: string
          description: Any other body feedback, soreness, injuries, energy level
        adjustment:
          type: string
          description: What to change next time (weight, pace, volume, rest)
        tags:
          type: array
          items:
            type: string
          description: Lowercase tags without # (e.g. spartan, hill, carry, chest, apple-fitness)
        ai_source:
          type: string
          default: chatgpt
          description: Always set to chatgpt
        metadata:
          type: object
          description: Any additional data that doesn't fit other fields (e.g. Apple Watch metrics, Strava link)
    Exercise:
      type: object
      description: "Exercise from Fitbod catalog. muscle_strength_score (mscore) is 0-100 effectiveness for building strength. sets_logged = popularity."
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Exercise name (e.g. Barbell Bench Press, Pull Up)
        level:
          type: string
          enum: [beginner, intermediate, advanced]
        equipment:
          type: string
          description: Equipment needed (e.g. Barbell, Dumbbell, Cable, Body Weight)
        primary_muscle_groups:
          type: string
          description: Primary muscles targeted
        category:
          type: string
          description: Muscle category for grouping
        muscle_strength_score:
          type: number
          description: "mscore: 0-100 effectiveness for strength building. 100=most effective."
        sets_logged:
          type: integer
          description: Total sets logged across all Fitbod users (popularity)
        description:
          type: string
    GymProfile:
      type: object
      description: A gym or training location with available equipment
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Gym name (e.g. Home Gym, LA Fitness, Outdoor / Trail)
        equipment:
          type: array
          items:
            type: string
          description: Available equipment list
        is_primary:
          type: boolean
        notes:
          type: string
    GymProfileInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        equipment:
          type: array
          items:
            type: string
        is_primary:
          type: boolean
        notes:
          type: string
    Workout:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        workout_date:
          type: string
          format: date
        workout_type:
          type: string
        location:
          type: string
        elevation:
          type: string
        focus:
          type: string
        warmup:
          type: string
        main_sets:
          type: string
        carries:
          type: string
        exercises:
          type: array
          items:
            type: object
        class_name:
