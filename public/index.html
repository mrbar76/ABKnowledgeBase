<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AB Knowledge Base</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
  <!-- Bottom Navigation (mobile-first) -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="dashboard">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
      <span>Home</span>
    </button>
    <button class="nav-btn" data-view="kanban">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M4 4h4v16H4V4zm6 0h4v12h-4V4zm6 0h4v8h-4V4z"/></svg>
      <span>Kanban</span>
    </button>
    <button class="nav-btn" data-view="knowledge">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      <span>Brain</span>
    </button>
    <button class="nav-btn" data-view="transcripts">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
      <span>Transcripts</span>
    </button>
    <button class="nav-btn" data-view="projects">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
      <span>Projects</span>
    </button>
  </nav>

  <!-- Header -->
  <header class="app-header">
    <h1>AB Knowledge Base</h1>
    <span class="subtitle">Unified AI Brain</span>
  </header>

  <!-- Views Container -->
  <main class="views-container">

    <!-- Dashboard View -->
    <section id="view-dashboard" class="view active">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="card">
        <h2>Tasks by Status</h2>
        <div class="chart-container" id="chart-tasks-status"></div>
      </div>
      <div class="card">
        <h2>Knowledge by AI Source</h2>
        <div class="chart-container" id="chart-knowledge-source"></div>
      </div>
      <div class="card">
        <h2>Tasks by Agent</h2>
        <div class="chart-container" id="chart-tasks-agent"></div>
      </div>
      <div class="card">
        <h2>Recent Activity</h2>
        <div id="recent-activity"></div>
      </div>
    </section>

    <!-- Kanban View -->
    <section id="view-kanban" class="view">
      <div class="kanban-header">
        <h2>Task Board</h2>
        <select id="kanban-project-filter">
          <option value="">All Projects</option>
        </select>
      </div>
      <div class="kanban-board" id="kanban-board">
        <div class="kanban-column" data-status="todo">
          <div class="kanban-col-header"><span class="status-dot todo"></span> To Do <span class="count" id="count-todo">0</span></div>
          <div class="kanban-cards" id="kanban-todo"></div>
        </div>
        <div class="kanban-column" data-status="in_progress">
          <div class="kanban-col-header"><span class="status-dot in_progress"></span> In Progress <span class="count" id="count-in_progress">0</span></div>
          <div class="kanban-cards" id="kanban-in_progress"></div>
        </div>
        <div class="kanban-column" data-status="review">
          <div class="kanban-col-header"><span class="status-dot review"></span> Review <span class="count" id="count-review">0</span></div>
          <div class="kanban-cards" id="kanban-review"></div>
        </div>
        <div class="kanban-column" data-status="done">
          <div class="kanban-col-header"><span class="status-dot done"></span> Done <span class="count" id="count-done">0</span></div>
          <div class="kanban-cards" id="kanban-done"></div>
        </div>
      </div>
      <button class="fab" onclick="openTaskModal()">+</button>
    </section>

    <!-- Knowledge View -->
    <section id="view-knowledge" class="view">
      <div class="search-bar">
        <input type="text" id="knowledge-search" placeholder="Search your brain...">
        <button onclick="searchKnowledge()">Search</button>
      </div>
      <div class="filter-chips" id="category-chips"></div>
      <div id="knowledge-list" class="knowledge-list"></div>
      <button class="fab" onclick="openKnowledgeModal()">+</button>
    </section>

    <!-- Transcripts View -->
    <section id="view-transcripts" class="view">
      <div class="search-bar">
        <input type="text" id="transcript-search" placeholder="Search transcripts...">
        <button onclick="searchTranscripts()">Search</button>
      </div>
      <div id="transcript-list" class="knowledge-list"></div>
      <button class="fab" onclick="openTranscriptModal()">+</button>
    </section>

    <!-- Projects View -->
    <section id="view-projects" class="view">
      <div id="projects-list" class="projects-list"></div>
      <button class="fab" onclick="openProjectModal()">+</button>
    </section>
  </main>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-title">Create</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
