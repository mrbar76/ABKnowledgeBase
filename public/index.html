<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <title>AB Brain</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6366f1">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AB Brain">
  <link rel="apple-touch-icon" href="/icons/icon.svg">

  <meta name="format-detection" content="telephone=no">
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen" style="display:none">
    <div class="login-card">
      <img src="/icons/icon.svg" alt="AB Brain" class="login-logo">
      <h1 class="login-title">AB Brain</h1>
      <p class="login-subtitle">Unified AI Knowledge Base</p>
      <form onsubmit="doLogin(event)">
        <div class="form-group">
          <input type="password" id="login-key" placeholder="API Key" required style="font-family:monospace;text-align:center;font-size:1rem">
        </div>
        <div id="login-error" style="display:none;color:var(--red);font-size:0.8rem;margin-bottom:12px;text-align:center"></div>
        <label style="display:flex;align-items:center;justify-content:center;gap:6px;font-size:0.8rem;color:var(--text-dim);margin-bottom:16px;cursor:pointer">
          <input type="checkbox" id="login-remember" checked> Remember me
        </label>
        <button type="submit" class="btn-submit" style="width:100%">Log In</button>
      </form>
    </div>
  </div>

  <!-- Header -->
  <header class="app-header">
    <img src="/icons/icon.svg" alt="AB" class="header-logo" onclick="toggleSettingsMenu()" style="cursor:pointer">
    <div class="header-text">
      <h1>AB Brain</h1>
      <span class="subtitle">Unified AI Knowledge Base</span>
    </div>
    <button class="global-search-btn" onclick="openGlobalSearch()" title="Search (Ctrl+K)">
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span class="search-hint">Ctrl+K</span>
    </button>
  </header>

  <!-- Settings Menu (tap logo to open) -->
  <div id="settings-menu" class="settings-menu" onclick="if(event.target===this)closeSettingsMenu()">
    <div class="settings-panel">
      <div class="settings-header">
        <h3>Settings</h3>
        <button class="modal-close" onclick="closeSettingsMenu()">&times;</button>
      </div>
      <div class="settings-body">
        <div class="settings-row">
          <div class="settings-row-label">Backend</div>
          <div class="settings-row-value" id="sm-backend-val">checking...</div>
        </div>
        <div class="settings-row">
          <div class="settings-row-label">Bee Token</div>
          <div class="settings-row-value" id="sm-bee-val">—</div>
        </div>
        <div class="settings-row">
          <div class="settings-row-label">OpenAI (Intake)</div>
          <div class="settings-row-value" id="sm-openai-val">—</div>
        </div>
        <div class="settings-row">
          <div class="settings-row-label">Bee Synced</div>
          <div class="settings-row-value" id="sm-synced-val">—</div>
        </div>

        <div style="padding-top:14px;border-top:1px solid var(--border);margin-top:4px">
          <div style="font-size:0.85rem;font-weight:700;margin-bottom:8px">Bee Sync</div>
          <div class="sync-actions" style="margin-bottom:8px">
            <button class="btn-action" onclick="triggerBeeSyncFromMenu('incremental')" id="sm-btn-sync-updates">Sync Updates</button>
            <button class="btn-action btn-action-secondary" onclick="triggerBeeSyncFromMenu('full')" id="sm-btn-sync-full">Full Sync</button>
          </div>
          <div id="sm-sync-result" style="display:none;font-size:0.8rem;padding:10px;border-radius:6px;background:var(--bg-input)"></div>
          <div style="margin-top:10px">
            <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:4px">Sync conversations by date range:</div>
            <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
              <input type="date" id="sm-conv-start" style="flex:1;padding:4px 6px;border-radius:4px;border:1px solid var(--border);background:var(--bg-input);color:var(--text);font-size:0.75rem">
              <span style="color:var(--text-dim);font-size:0.75rem">to</span>
              <input type="date" id="sm-conv-end" style="flex:1;padding:4px 6px;border-radius:4px;border:1px solid var(--border);background:var(--bg-input);color:var(--text);font-size:0.75rem">
            </div>
            <button class="btn-action btn-action-secondary" onclick="syncConversationsByDate()" id="sm-btn-sync-convos" style="width:100%">Sync Conversations</button>
            <div id="sm-conv-sync-result" style="display:none;font-size:0.8rem;padding:10px;border-radius:6px;background:var(--bg-input);margin-top:6px"></div>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:8px;padding-top:14px;border-top:1px solid var(--border);margin-top:14px">
          <button class="btn-action btn-action-secondary" onclick="closeSettingsMenu();showDebugPanel()" style="width:100%">Diagnostics &amp; Logs</button>
          <button class="btn-action btn-action-secondary" onclick="closeSettingsMenu();logout()" style="width:100%">Log Out</button>
          <button class="btn-action btn-action-danger" id="btn-purge-settings" onclick="confirmPurgeFromMenu()" style="width:100%">Purge All Data</button>
          <div id="purge-menu-result" style="display:none;font-size:0.8rem;padding:10px;border-radius:6px;background:var(--bg-input)"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Global Search Overlay -->
  <div id="search-overlay" class="search-overlay" onclick="closeGlobalSearch()">
    <div class="search-container" onclick="event.stopPropagation()">
      <div class="search-input-wrapper">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="global-search-input" placeholder="Search everything..." autocomplete="off">
        <kbd class="search-kbd">ESC</kbd>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>
  </div>

  <!-- Single Page Content — rendered by app.js -->
  <main id="main-content" class="page-content"></main>

  <!-- Bottom Tab Navigation -->
  <nav id="bottom-nav" class="bottom-nav">
    <button class="tab-btn active" data-tab="home" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Home</span>
    </button>
    <button class="tab-btn" data-tab="kanban" onclick="switchTab('kanban')">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M4 4h4v16H4V4zm6 0h4v12h-4V4zm6 0h4v8h-4V4z"/></svg>
      <span>Kanban</span>
    </button>
    <button class="tab-btn" data-tab="brain" onclick="switchTab('brain')">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      <span>Brain</span>
    </button>
    <button class="tab-btn" data-tab="transcripts" onclick="switchTab('transcripts')">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
      <span>Transcripts</span>
    </button>
    <button class="tab-btn" data-tab="workouts" onclick="switchTab('workouts')">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z"/></svg>
      <span>Workouts</span>
    </button>
    <button class="tab-btn" data-tab="projects" onclick="switchTab('projects')">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
      <span>Projects</span>
    </button>
  </nav>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-title">Detail</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        reg.update();
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) { refreshing = true; window.location.reload(); }
        });
      });
    }
  </script>
</body>
</html>
