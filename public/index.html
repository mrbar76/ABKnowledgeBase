<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <title>AB Brain</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6366f1">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AB Brain">
  <link rel="apple-touch-icon" href="/icons/icon.svg">

  <meta name="format-detection" content="telephone=no">
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen" style="display:none">
    <div class="login-card">
      <img src="/icons/icon.svg" alt="AB Brain" class="login-logo">
      <h1 class="login-title">AB Brain</h1>
      <p class="login-subtitle">Unified AI Knowledge Base</p>
      <form onsubmit="doLogin(event)">
        <div class="form-group">
          <input type="password" id="login-key" placeholder="API Key" required style="font-family:monospace;text-align:center;font-size:1rem">
        </div>
        <div id="login-error" style="display:none;color:var(--red);font-size:0.8rem;margin-bottom:12px;text-align:center"></div>
        <label style="display:flex;align-items:center;justify-content:center;gap:6px;font-size:0.8rem;color:var(--text-dim);margin-bottom:16px;cursor:pointer">
          <input type="checkbox" id="login-remember" checked> Remember me
        </label>
        <button type="submit" class="btn-submit" style="width:100%">Log In</button>
      </form>
    </div>
  </div>

  <!-- Header -->
  <header class="app-header">
    <img src="/icons/icon.svg" alt="AB" class="header-logo">
    <div class="header-text">
      <h1>AB Brain</h1>
      <span class="subtitle">Unified AI Knowledge Base</span>
    </div>
    <button class="global-search-btn" onclick="openGlobalSearch()" title="Search (Ctrl+K)">
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span class="search-hint">Ctrl+K</span>
    </button>
  </header>

  <!-- Global Search Overlay -->
  <div id="search-overlay" class="search-overlay" onclick="closeGlobalSearch()">
    <div class="search-container" onclick="event.stopPropagation()">
      <div class="search-input-wrapper">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="global-search-input" placeholder="Search everything..." autocomplete="off">
        <kbd class="search-kbd">ESC</kbd>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>
  </div>

  <!-- Single Page Content -->
  <main class="page-content">

    <!-- Stats Overview -->
    <div class="stats-grid" id="stats-grid"></div>

    <!-- Bee Sync -->
    <div class="card">
      <h2>Bee Wearable Sync</h2>
      <div id="bee-sync-status" style="font-size:0.8rem;color:var(--text-dim);margin-bottom:12px"></div>
      <div class="sync-actions">
        <button class="btn-action" onclick="triggerBeeSync('incremental')" id="btn-sync-updates">Sync Updates</button>
        <button class="btn-action btn-action-secondary" onclick="triggerBeeSync('full')" id="btn-sync-full">Full Sync</button>
      </div>
      <div id="bee-sync-result" style="display:none;margin-top:12px;font-size:0.8rem;padding:10px;border-radius:6px;background:var(--bg-input)"></div>
    </div>

    <!-- Sync Status -->
    <div class="card">
      <h2>Sync Status</h2>
      <div id="sync-status-panel"></div>
      <h3 style="font-size:0.85rem;color:var(--text-dim);margin:12px 0 8px">Recent Jobs</h3>
      <div id="sync-job-history"></div>
    </div>

    <!-- Recent Activity -->
    <div class="card" id="activity-card" style="display:none">
      <h2>Recent Activity</h2>
      <div id="recent-activity"></div>
    </div>

    <!-- Tools -->
    <div class="card">
      <h2>Tools</h2>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn-action btn-action-danger" onclick="confirmPurge()" id="btn-purge" style="width:100%">Clear All Data</button>
      </div>
      <div id="purge-result" style="display:none;margin-top:10px;font-size:0.8rem;padding:10px;border-radius:6px;background:var(--bg-input)"></div>
    </div>

  </main>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-title">Detail</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        reg.update();
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) { refreshing = true; window.location.reload(); }
        });
      });
    }
  </script>
</body>
</html>
